<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<p style="font-family:monospace;padding:2rem">Signing in...</p>
<script>
const SUPABASE_URL = 'https://wmxxomiuzdhmvysefrjg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oMyje3R_YGvTETd1qtLTCg_KC314Teu';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'guitar-explorer-auth',
    storage: window.localStorage,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'implicit'
  }
});

async function handleCallback() {
  const hash = window.location.hash;
  const query = window.location.search;

  console.log('Hash length:', hash.length);
  console.log('Has access_token:', hash.includes('access_token'));

  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    console.log('Token found, setting session...');
    
    const { data, error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken || ''
    });
    console.log('setSession user:', data?.session?.user?.email);
    console.log('setSession error:', error);
    
    // Verify it was saved
    const { data: { session } } = await sb.auth.getSession();
    console.log('Verified session:', session?.user?.email);
    
    // Check localStorage directly
    const stored = localStorage.getItem('guitar-explorer-auth');
    console.log('localStorage stored:', stored ? 'YES' : 'NO');
  } else {
    console.log('No token in hash - checking existing session');
    const { data: { session } } = await sb.auth.getSession();
    console.log('Existing session:', session?.user?.email);
  }

  // Wait 3 seconds so we can read the logs, then redirect
  document.querySelector('p').textContent = 'Done - redirecting in 3 seconds...';
  await new Promise(r => setTimeout(r, 3000));
  window.location.href = 'https://guitar-explorer.com/chord-library.html';
}

handleCallback();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { background:#1F1F1F; color:#F4F1E8; font-family:'Courier New',monospace; padding:2rem; }
  .ok { color:#6FA873; }
  .err { color:#E25757; }
  p { margin:0.3rem 0; }
</style>
</head>
<body>
<div id="log"><p>Starting...</p></div>
<script>
var SUPABASE_URL = 'https://wmxxomiuzdhmvysefrjg.supabase.co';
var SUPABASE_KEY = 'sb_publishable_oMyje3R_YGvTETd1qtLTCg_KC314Teu';
var STORAGE_KEY = 'guitar-explorer-auth';

function log(msg, cls) {
  document.getElementById('log').innerHTML += '<p class="'+(cls||'')+'">' + msg + '</p>';
}

var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: STORAGE_KEY,
    storage: window.localStorage,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'implicit'
  }
});

async function handleCallback() {
  var hash = window.location.hash;
  log('Hash: ' + (hash.length > 10 ? hash.substring(0,30)+'...' : 'empty'));

  if (hash && hash.includes('access_token')) {
    log('Token found!', 'ok');
    var params = new URLSearchParams(hash.substring(1));
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token') || '';

    try {
      var result = await sb.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      
      if (result.error) {
        log('Error: ' + result.error.message, 'err');
      } else if (result.data && result.data.session) {
        log('Signed in as: ' + result.data.session.user.email, 'ok');
        var stored = localStorage.getItem(STORAGE_KEY);
        log('localStorage saved: ' + (stored ? 'YES' : 'NO'), stored ? 'ok' : 'err');
        log('Going to library...', 'ok');
        setTimeout(function() {
          window.location.replace('https://guitar-explorer.com/chord-library.html');
        }, 1500);
        return;
      }
    } catch(e) {
      log('Exception: ' + e.message, 'err');
    }
  } else {
    log('No token - checking existing session...');
    try {
      var s = await sb.auth.getSession();
      if (s.data && s.data.session) {
        log('Session exists: ' + s.data.session.user.email, 'ok');
        window.location.replace('https://guitar-explorer.com/chord-library.html');
        return;
      }
    } catch(e) {}
    log('No session found', 'err');
  }

  log('Redirecting in 3s...');
  setTimeout(function() {
    window.location.replace('https://guitar-explorer.com/chord-library.html');
  }, 3000);
}

handleCallback();
</script>
</body>
</html>
